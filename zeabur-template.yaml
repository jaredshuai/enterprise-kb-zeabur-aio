apiVersion: zeabur.com/v1
kind: Template
metadata:
  name: Enterprise KB Full Stack
spec:
  description: Enterprise knowledge base full stack with Paperless-ngx, RAGFlow, Dify placeholders, and kb-bridge.
  tags:
    - knowledge-base
    - rag
    - paperless
    - ragflow
    - dify
  readme: |-
    # Enterprise KB Full Stack

    This template is an experimental Zeabur version of the enterprise knowledge base stack.

    It targets a Zeabur multi-service deployment and includes Paperless-ngx, RAGFlow, Dify support services, and kb-bridge.

    Important notes:
    - Paperless service is expected to work as the document governance layer.
    - RAGFlow on Zeabur is heavy; Zeabur also provides an official RAGFlow template. If this bundled version does not start cleanly, deploy Zeabur's official RAGFlow template and point kb-bridge to it.
    - Dify is complex and normally runs 8+ services. This bundled template only provides a starting point; Zeabur already has Dify templates that are more complete.
    - For production use, prefer PVE/VPS full mode from this repository.
  variables:
    - key: PAPERLESS_SECRET_KEY
      type: PASSWORD
      name: Paperless secret key
      default: change-me-paperless-secret
    - key: PAPERLESS_POSTGRES_PASSWORD
      type: PASSWORD
      name: Paperless database password
      default: change-me-paperless-db
    - key: BRIDGE_API_KEY
      type: PASSWORD
      name: Bridge API key
      default: change-me-bridge-key
    - key: RAGFLOW_API_KEY
      type: PASSWORD
      name: RAGFlow API key
      default: ""
    - key: RAGFLOW_CONTRACT_DATASET_ID
      type: STRING
      name: RAGFlow contract dataset id
      default: ""
    - key: RAGFLOW_BID_DATASET_ID
      type: STRING
      name: RAGFlow bid dataset id
      default: ""
    - key: RAGFLOW_PROPOSAL_DATASET_ID
      type: STRING
      name: RAGFlow proposal dataset id
      default: ""
    - key: RAGFLOW_DELIVERY_DATASET_ID
      type: STRING
      name: RAGFlow delivery dataset id
      default: ""
    - key: RAGFLOW_GENERAL_DATASET_ID
      type: STRING
      name: RAGFlow general dataset id
      default: ""
  services:
    - name: paperless-postgres
      template: PREBUILT
      spec:
        source:
          image: postgres:16
        ports:
          - id: postgres
            port: 5432
            type: TCP
        env:
          POSTGRES_DB:
            default: paperless
          POSTGRES_USER:
            default: paperless
          POSTGRES_PASSWORD:
            default: ${PAPERLESS_POSTGRES_PASSWORD}
        volumes:
          - id: data
            dir: /var/lib/postgresql/data

    - name: paperless-redis
      template: PREBUILT
      spec:
        source:
          image: redis:7
        ports:
          - id: redis
            port: 6379
            type: TCP
        volumes:
          - id: data
            dir: /data

    - name: paperless-gotenberg
      template: PREBUILT
      spec:
        source:
          image: gotenberg/gotenberg:8
        command:
          - gotenberg
          - --chromium-disable-javascript=true
          - --chromium-allow-list=file:///tmp/.*
        ports:
          - id: web
            port: 3000
            type: HTTP

    - name: paperless-tika
      template: PREBUILT
      spec:
        source:
          image: apache/tika:latest
        ports:
          - id: web
            port: 9998
            type: HTTP

    - name: paperless
      template: PREBUILT
      dependencies:
        - paperless-postgres
        - paperless-redis
        - paperless-gotenberg
        - paperless-tika
      spec:
        source:
          image: ghcr.io/paperless-ngx/paperless-ngx:latest
        ports:
          - id: web
            port: 8000
            type: HTTP
        env:
          PAPERLESS_REDIS:
            default: redis://paperless-redis:6379
          PAPERLESS_DBHOST:
            default: paperless-postgres
          PAPERLESS_DBNAME:
            default: paperless
          PAPERLESS_DBUSER:
            default: paperless
          PAPERLESS_DBPASS:
            default: ${PAPERLESS_POSTGRES_PASSWORD}
          PAPERLESS_SECRET_KEY:
            default: ${PAPERLESS_SECRET_KEY}
          PAPERLESS_TIME_ZONE:
            default: Asia/Shanghai
          PAPERLESS_OCR_LANGUAGE:
            default: chi_sim+eng
          PAPERLESS_OCR_LANGUAGES:
            default: chi-sim eng
          PAPERLESS_TIKA_ENABLED:
            default: "1"
          PAPERLESS_TIKA_GOTENBERG_ENDPOINT:
            default: http://paperless-gotenberg:3000
          PAPERLESS_TIKA_ENDPOINT:
            default: http://paperless-tika:9998
          PAPERLESS_CONSUMER_RECURSIVE:
            default: "true"
          PAPERLESS_CONSUMER_SUBDIRS_AS_TAGS:
            default: "true"
        volumes:
          - id: data
            dir: /usr/src/paperless/data
          - id: media
            dir: /usr/src/paperless/media
          - id: export
            dir: /usr/src/paperless/export
          - id: consume
            dir: /usr/src/paperless/consume

    - name: ragflow-mysql
      template: PREBUILT
      spec:
        source:
          image: mysql:8.0
        ports:
          - id: mysql
            port: 3306
            type: TCP
        env:
          MYSQL_ROOT_PASSWORD:
            default: infini_rag_flow
          MYSQL_DATABASE:
            default: rag_flow
        volumes:
          - id: data
            dir: /var/lib/mysql

    - name: ragflow-redis
      template: PREBUILT
      spec:
        source:
          image: valkey/valkey:8
        ports:
          - id: redis
            port: 6379
            type: TCP
        volumes:
          - id: data
            dir: /data

    - name: ragflow-minio
      template: PREBUILT
      spec:
        source:
          image: quay.io/minio/minio:latest
        command:
          - server
          - /data
          - --console-address
          - :9001
        ports:
          - id: api
            port: 9000
            type: HTTP
          - id: console
            port: 9001
            type: HTTP
        env:
          MINIO_ROOT_USER:
            default: rag_flow
          MINIO_ROOT_PASSWORD:
            default: infini_rag_flow
        volumes:
          - id: data
            dir: /data

    - name: ragflow-elasticsearch
      template: PREBUILT
      spec:
        source:
          image: docker.elastic.co/elasticsearch/elasticsearch:8.19.3
        ports:
          - id: es
            port: 9200
            type: HTTP
        env:
          discovery.type:
            default: single-node
          xpack.security.enabled:
            default: "false"
          ES_JAVA_OPTS:
            default: -Xms1g -Xmx1g
        volumes:
          - id: data
            dir: /usr/share/elasticsearch/data

    - name: ragflow
      template: PREBUILT
      dependencies:
        - ragflow-mysql
        - ragflow-redis
        - ragflow-minio
        - ragflow-elasticsearch
      spec:
        source:
          image: infiniflow/ragflow:v0.20.3-slim
        ports:
          - id: web
            port: 80
            type: HTTP
        env:
          TZ:
            default: Asia/Shanghai
          MYSQL_HOST:
            default: ragflow-mysql
          REDIS_HOST:
            default: ragflow-redis
          MINIO_HOST:
            default: ragflow-minio:9000
          ES_HOSTS:
            default: http://ragflow-elasticsearch:9200
        volumes:
          - id: data
            dir: /ragflow

    - name: dify-postgres
      template: PREBUILT
      spec:
        source:
          image: postgres:15-alpine
        ports:
          - id: postgres
            port: 5432
            type: TCP
        env:
          POSTGRES_DB:
            default: dify
          POSTGRES_USER:
            default: postgres
          POSTGRES_PASSWORD:
            default: change-me-dify-db
        volumes:
          - id: data
            dir: /var/lib/postgresql/data

    - name: dify-redis
      template: PREBUILT
      spec:
        source:
          image: redis:6-alpine
        ports:
          - id: redis
            port: 6379
            type: TCP
        volumes:
          - id: data
            dir: /data

    - name: dify-weaviate
      template: PREBUILT
      spec:
        source:
          image: semitechnologies/weaviate:1.27.0
        ports:
          - id: web
            port: 8080
            type: HTTP
        env:
          QUERY_DEFAULTS_LIMIT:
            default: "25"
          AUTHENTICATION_ANONYMOUS_ACCESS_ENABLED:
            default: "true"
          PERSISTENCE_DATA_PATH:
            default: /var/lib/weaviate
          DEFAULT_VECTORIZER_MODULE:
            default: none
        volumes:
          - id: data
            dir: /var/lib/weaviate

    - name: dify-api
      template: PREBUILT
      dependencies:
        - dify-postgres
        - dify-redis
        - dify-weaviate
      spec:
        source:
          image: langgenius/dify-api:1.10.1
        ports:
          - id: api
            port: 5001
            type: HTTP
        env:
          MODE:
            default: api
          DB_USERNAME:
            default: postgres
          DB_PASSWORD:
            default: change-me-dify-db
          DB_HOST:
            default: dify-postgres
          DB_PORT:
            default: "5432"
          DB_DATABASE:
            default: dify
          REDIS_HOST:
            default: dify-redis
          REDIS_PORT:
            default: "6379"
          VECTOR_STORE:
            default: weaviate
          WEAVIATE_ENDPOINT:
            default: http://dify-weaviate:8080
          SECRET_KEY:
            default: change-me-dify-secret

    - name: dify-web
      template: PREBUILT
      dependencies:
        - dify-api
      spec:
        source:
          image: langgenius/dify-web:1.10.1
        ports:
          - id: web
            port: 3000
            type: HTTP
        env:
          CONSOLE_API_URL:
            default: http://dify-api:5001
          APP_API_URL:
            default: http://dify-api:5001

    - name: kb-bridge
      template: PREBUILT
      dependencies:
        - ragflow
      spec:
        source:
          image: python:3.12-slim
        command:
          - sh
          - -c
          - |-
            pip install fastapi==0.115.6 'uvicorn[standard]'==0.34.0 httpx==0.28.1 pydantic==2.10.4 python-multipart==0.0.20
            python - <<'PY'
            import pathlib, urllib.request
            pathlib.Path('/app').mkdir(exist_ok=True)
            urllib.request.urlretrieve('https://raw.githubusercontent.com/jaredshuai/enterprise-kb-zeabur-aio/main/bridge/main.py','/app/main.py')
            PY
            cd /app
            uvicorn main:app --host 0.0.0.0 --port 8080
        ports:
          - id: web
            port: 8080
            type: HTTP
        env:
          DATA_DIR:
            default: /data
          OUTBOX_DIR:
            default: /paperless-outbox
          BRIDGE_API_KEY:
            default: ${BRIDGE_API_KEY}
          BRIDGE_SYNC_ENABLED:
            default: "true"
          BRIDGE_REQUIRE_TAG:
            default: 状态/可入RAG
          RAGFLOW_BASE_URL:
            default: http://ragflow
          RAGFLOW_API_KEY:
            default: ${RAGFLOW_API_KEY}
          RAGFLOW_CONTRACT_DATASET_ID:
            default: ${RAGFLOW_CONTRACT_DATASET_ID}
          RAGFLOW_BID_DATASET_ID:
            default: ${RAGFLOW_BID_DATASET_ID}
          RAGFLOW_PROPOSAL_DATASET_ID:
            default: ${RAGFLOW_PROPOSAL_DATASET_ID}
          RAGFLOW_DELIVERY_DATASET_ID:
            default: ${RAGFLOW_DELIVERY_DATASET_ID}
          RAGFLOW_GENERAL_DATASET_ID:
            default: ${RAGFLOW_GENERAL_DATASET_ID}
        volumes:
          - id: data
            dir: /data
