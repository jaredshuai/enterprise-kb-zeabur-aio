services:
  caddy:
    image: caddy:2
    container_name: kb-caddy
    restart: unless-stopped
    ports:
      - "${CADDY_HTTP_PORT:-80}:80"
      - "${CADDY_HTTPS_PORT:-443}:443"
    volumes:
      - ./caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - ${KB_ROOT:-./runtime}/caddy/data:/data
      - ${KB_ROOT:-./runtime}/caddy/config:/config
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      - paperless-webserver
      - kb-bridge

  kb-bridge:
    build:
      context: ./bridge
    container_name: kb-bridge
    restart: unless-stopped
    ports:
      - "${BRIDGE_DIRECT_PORT:-18080}:8080"
    environment:
      DATA_DIR: /data
      OUTBOX_DIR: /paperless-outbox
      BRIDGE_API_KEY: ${BRIDGE_API_KEY:-change-me-bridge-key}
      BRIDGE_SYNC_ENABLED: ${BRIDGE_SYNC_ENABLED:-true}
      BRIDGE_REQUIRE_TAG: ${BRIDGE_REQUIRE_TAG:-状态/可入RAG}
      BRIDGE_SUCCESS_TAG: ${BRIDGE_SUCCESS_TAG:-状态/已入RAG}
      BRIDGE_FAILED_TAG: ${BRIDGE_FAILED_TAG:-状态/同步失败}
      BRIDGE_POLL_SECONDS: ${BRIDGE_POLL_SECONDS:-120}
      RAGFLOW_BASE_URL: ${RAGFLOW_BASE_URL:-http://host.docker.internal}
      RAGFLOW_API_KEY: ${RAGFLOW_API_KEY:-}
      RAGFLOW_CONTRACT_DATASET_ID: ${RAGFLOW_CONTRACT_DATASET_ID:-}
      RAGFLOW_BID_DATASET_ID: ${RAGFLOW_BID_DATASET_ID:-}
      RAGFLOW_PROPOSAL_DATASET_ID: ${RAGFLOW_PROPOSAL_DATASET_ID:-}
      RAGFLOW_DELIVERY_DATASET_ID: ${RAGFLOW_DELIVERY_DATASET_ID:-}
      RAGFLOW_GENERAL_DATASET_ID: ${RAGFLOW_GENERAL_DATASET_ID:-}
    volumes:
      - ${KB_ROOT:-./runtime}/bridge:/data
      - ${PAPERLESS_DATA:-./runtime/paperless}/outbox:/paperless-outbox
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 10

networks:
  default:
    name: enterprise-kb
